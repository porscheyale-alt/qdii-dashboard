<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QDII 净值监控看板</title>

<style>
:root{
  --up:#e63025;      /* 涨-红 */
  --up-bg:#fdeceb;
  --down:#09a350;    /* 跌-绿 */
  --down-bg:#e8f7ef;
  --bg:#eef1f6;
  --card:#ffffff;
  --line:#e9ecf1;
  --text:#1a1f28;
  --sub:#8b929c;
  --brand:#2b5cff;
  --brand-2:#5b7dff;
  --shadow:0 1px 3px rgba(20,30,60,.06),0 6px 20px rgba(20,30,60,.04);
  --shadow-hover:0 4px 14px rgba(20,30,60,.10),0 12px 32px rgba(20,30,60,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
header{background:linear-gradient(120deg,#1e3a8a 0%,#2b5cff 55%,#4f7bff 100%);
  padding:18px 24px;display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:20;box-shadow:0 2px 12px rgba(30,58,138,.18)}
header h1{font-size:19px;font-weight:700;display:flex;align-items:center;gap:9px;color:#fff;letter-spacing:.3px}
header h1 .dot{width:10px;height:10px;border-radius:50%;background:#6ee7a8;
  box-shadow:0 0 0 4px rgba(110,231,168,.25);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.meta{color:rgba(255,255,255,.85);font-size:12px;background:rgba(255,255,255,.14);
  padding:6px 12px;border-radius:20px;backdrop-filter:blur(4px)}
.meta b{color:#fff;font-weight:700;font-size:13px}
.wrap{max-width:1240px;margin:0 auto;padding:22px 24px 60px}

/* 汇总卡片 */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:22px}
.scard{position:relative;background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:16px 18px;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s;overflow:hidden}
.scard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--brand);opacity:.65}
.scard.c-up::before{background:var(--up)}
.scard.c-down::before{background:var(--down)}
.scard:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover)}
.scard .lbl{color:var(--sub);font-size:12px;margin-bottom:7px;font-weight:500}
.scard .val{font-size:25px;font-weight:700;line-height:1.15}
.scard .val small{font-size:13px;font-weight:500;color:var(--sub)}
.scard .val br+small{display:inline-block;margin-top:3px;color:var(--sub);font-size:11px;font-weight:400}

/* 工具条 */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.tabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:11px;
  padding:4px;box-shadow:var(--shadow);flex-wrap:wrap}
.tab{padding:7px 15px;border-radius:8px;cursor:pointer;color:var(--sub);font-weight:500;
  transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--brand);background:#f2f5ff}
.tab.active{background:var(--brand);color:#fff;box-shadow:0 2px 8px rgba(43,92,255,.3)}
.tab.active:hover{background:var(--brand);color:#fff}
.search{flex:1;min-width:180px;max-width:340px;position:relative}
.search::before{content:"🔍";position:absolute;left:13px;top:50%;transform:translateY(-50%);
  font-size:13px;opacity:.5;pointer-events:none}
.search input{width:100%;padding:10px 14px 10px 36px;border:1px solid var(--line);border-radius:11px;
  background:var(--card);font-size:14px;outline:none;box-shadow:var(--shadow);transition:border-color .15s,box-shadow .15s}
.search input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(43,92,255,.12)}
.sortsel{padding:10px 12px;border:1px solid var(--line);border-radius:11px;background:var(--card);
  font-size:13px;cursor:pointer;box-shadow:var(--shadow);outline:none;transition:border-color .15s}
.sortsel:focus{border-color:var(--brand)}
.toolbar-inline{display:flex;gap:8px;align-items:center;flex:1}

/* 列表 */
.tablewrap{background:var(--card);border:1px solid var(--line);border-radius:14px;
  overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse}
thead th{background:#f7f9fc;text-align:left;padding:13px 14px;font-size:12px;color:var(--sub);
  font-weight:600;border-bottom:1px solid var(--line);white-space:nowrap;position:sticky;top:0}
tbody td{padding:13px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer;transition:background .12s}
tbody tr:nth-child(even){background:#fbfcfe}
tbody tr:hover{background:#eef3ff}
.code{color:var(--sub);font-size:12px;font-variant-numeric:tabular-nums}
.fname{font-weight:600;max-width:340px}
.grp-tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:7px;
  background:#eef1ff;color:var(--brand);white-space:nowrap;font-weight:500}
.num{font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap}
.up{color:var(--up)}
.down{color:var(--down)}
/* 涨跌幅 pill 徽标 */
.pill{display:inline-block;min-width:66px;text-align:center;padding:4px 10px;border-radius:8px;
  font-weight:600;font-variant-numeric:tabular-nums;font-size:13px}
.pill.up{color:var(--up);background:var(--up-bg)}
.pill.down{color:var(--down);background:var(--down-bg)}
.pill.flat{color:var(--sub);background:#f0f1f4}
.spark{display:block}
/* 自选星标 */
.star{cursor:pointer;font-size:19px;line-height:1;color:#d3d6dc;user-select:none;
  transition:transform .12s,color .12s;display:inline-block}
.star:hover{transform:scale(1.25);color:#f5a623}
.star.on{color:#f5a623}
th.star-col,td.star-col{width:42px;text-align:center;padding-left:8px;padding-right:6px}
.tab .cnt{font-size:11px;opacity:.7;margin-left:4px;font-variant-numeric:tabular-nums}
.tab.active .cnt{opacity:.9}

/* 响应式：窄屏隐藏次要列，保留核心信息 */
@media (max-width:720px){
  header{padding:14px 16px}
  header h1{font-size:16px}
  .wrap{padding:12px 10px 50px}
  .summary{grid-template-columns:repeat(2,1fr);gap:8px}
  .scard{padding:11px 12px}
  .scard .val{font-size:19px}
  /* 手机端工具栏紧凑化：tab 缩小 + 搜索排序合一行 */
  .toolbar{gap:8px;margin-bottom:10px;flex-wrap:nowrap;flex-direction:column}
  .tabs{padding:3px;border-radius:9px;gap:3px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .tabs::-webkit-scrollbar{display:none}
  .tab{padding:5px 11px;border-radius:7px;font-size:13px;flex-shrink:0}
  .tab .cnt{display:none}  /* 手机端隐藏自选数量，节省空间 */
  .search{min-width:0;max-width:none;flex:1}
  .search input{padding:8px 12px 8px 32px;font-size:13px;border-radius:9px}
  .search::before{left:10px;font-size:12px}
  .sortsel{padding:8px 8px;border-radius:9px;font-size:12px;min-width:0;flex-shrink:0;width:auto}
  /* 手机端保留走势图（核心价值），只隐藏分组和净值日期 */
  .col-group,.col-date{display:none}
  .fname{max-width:none;font-size:13px}
  tbody td,thead th{padding:10px 7px}
  .col-spark{padding-left:3px;padding-right:3px}
  .pill{min-width:54px;padding:3px 6px;font-size:12px}
  th.star-col,td.star-col{width:30px;padding-left:4px;padding-right:2px}
  .star{font-size:17px}
  .tablewrap{border-radius:11px}
  thead th{padding:9px 7px;font-size:11px}
}

/* 详情抽屉 */
.mask{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:40;display:none}
.mask.show{display:block}
.drawer{position:fixed;top:0;right:0;height:100%;width:520px;max-width:92vw;background:var(--card);
  z-index:50;box-shadow:-4px 0 24px rgba(0,0,0,.12);transform:translateX(100%);
  transition:transform .25s;display:flex;flex-direction:column}
.drawer.show{transform:translateX(0)}
.drawer .dh{padding:20px 24px;border-bottom:1px solid var(--line)}
.drawer .dh .dname{font-size:17px;font-weight:600;margin-bottom:4px}
.drawer .dh .dcode{color:var(--sub);font-size:12px}
.drawer .db{padding:20px 24px;overflow:auto;flex:1}
.dstats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.dstat{background:var(--bg);border-radius:10px;padding:12px}
.dstat .l{color:var(--sub);font-size:12px;margin-bottom:4px}
.dstat .v{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
.chartbox{height:260px;margin-bottom:18px}
.close-btn{position:absolute;top:18px;right:20px;cursor:pointer;color:var(--sub);font-size:22px;
  line-height:1;background:none;border:none}
.navlist{width:100%;border-collapse:collapse;font-size:13px}
.navlist th,.navlist td{padding:8px 10px;border-bottom:1px solid var(--line);text-align:right}
.navlist th:first-child,.navlist td:first-child{text-align:left}
.footnote{color:var(--sub);font-size:12px;margin-top:24px;line-height:1.7}
.empty{text-align:center;color:var(--sub);padding:40px}
</style>
</head>
